    <style>
      :root {
        --bg-main: #393939;
        /* Match original dark gray */
        --bg-secondary: #2c2c2c;
        --bg-card: #404040;
        --text-primary: #ffffff;
        --text-secondary: #cccccc;
        --border-color: #555555;
        --accent: #f1b74b;
      }

      body {
        background-color: var(--bg-main);
        color: var(--text-primary);
        font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
      }

      .header-title {
        text-align: center;
        margin-top: 60px;
        margin-bottom: 8px;
        font-size: 2.5rem;
        font-weight: 800;
        color: #ffffff;
        letter-spacing: 2px;
      }

      .header-sub {
        text-align: center;
        color: var(--text-secondary);
        font-size: 0.9rem;
        letter-spacing: 3px;
        margin-bottom: 30px;
        font-weight: 500;
      }

      .tools-section {
        text-align: center;
        margin-bottom: 30px;
      }

      .btn-reading-assistant {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        color: var(--text-primary);
        padding: 10px 24px;
        font-size: 0.95rem;
        border-radius: 6px;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-block;
        letter-spacing: 1px;
      }

      .btn-reading-assistant:hover {
        background: #1a1a1a;
        color: var(--accent);
        border-color: var(--accent);
        box-shadow: 0 0 10px rgba(241, 183, 75, 0.2);
      }

      .search-section {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 15px;
        margin-bottom: 40px;
        flex-wrap: wrap;
      }

      .search-input {
        padding: 12px 20px;
        width: 300px;
        border-radius: 30px;
        border: 1px solid var(--border-color);
        background: var(--bg-secondary);
        color: var(--text-primary);
        outline: none;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .search-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(241, 183, 75, 0.3);
      }

      .search-input::placeholder {
        color: #999;
      }

      /* Custom Select Styling with Animations */
      .custom-select-wrapper {
        position: relative;
        width: 200px;
        user-select: none;
      }

      .custom-select {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 20px;
        border-radius: 30px;
        border: 1px solid var(--border-color);
        background: var(--bg-secondary);
        color: var(--text-primary);
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .custom-select:hover,
      .custom-select.open {
        border-color: var(--accent);
        box-shadow: 0 0 8px rgba(241, 183, 75, 0.3);
      }

      .custom-select-trigger span {
        display: block;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 130px;
      }

      .arrow {
        width: 10px;
        height: 10px;
        border-right: 2px solid var(--text-secondary);
        border-bottom: 2px solid var(--text-secondary);
        transform: rotate(45deg);
        transition: transform 0.3s ease;
        margin-top: -4px;
        margin-right: 4px;
      }

      .custom-select.open .arrow {
        transform: rotate(-135deg);
        margin-top: 4px;
      }

      .custom-options {
        position: absolute;
        display: block;
        top: 100%;
        left: 0;
        right: 0;
        border: 1px solid var(--border-color);
        border-radius: 16px;
        box-sizing: border-box;
        background: var(--bg-card);
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: translateY(-10px);
        margin-top: 8px;
        z-index: 10;
        max-height: 250px;
        overflow-y: auto;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }

      .custom-select.open+.custom-options {
        opacity: 1;
        visibility: visible;
        pointer-events: all;
        transform: translateY(0);
      }

      .custom-option {
        position: relative;
        display: block;
        padding: 12px 20px;
        font-size: 0.95rem;
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .custom-option:hover {
        background: rgba(255, 255, 255, 0.05);
        color: var(--accent);
      }

      .custom-option.selected {
        color: var(--accent);
        font-weight: 600;
        background: rgba(241, 183, 75, 0.1);
      }

      .bookshelf {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 30px;
        padding: 40px;
        max-width: 1200px;
        margin: 0 auto;
        background-color: transparent;
      }

      .book-card {
        background: var(--bg-card);
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border-color);
      }

      .book-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5);
        border-color: var(--accent);
      }

      .book-cover-wrapper {
        position: relative;
        width: 100%;
        aspect-ratio: 5 / 5;
        /* Wider, more square-like */
        overflow: hidden;
        background: #222;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border-color);
      }

      .book-cover-wrapper::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 8px;
        /* Thinner fake book edge */
        height: 100%;
        background: linear-gradient(to right, rgba(0, 0, 0, 0.5), transparent);
        z-index: 1;
        pointer-events: none;
      }

      .book-cover {
        width: 100%;
        height: 100%;
        margin-left: 10px;
        object-fit: fill;
        display: block;
        transition: transform 0.5s ease, opacity 0.3s ease;
        opacity: 0.95;
      }

      .book-card:hover .book-cover {
        transform: scale(1.05);
        opacity: 1;
      }

      .book-info {
        padding: 15px 10px;
        text-align: center;
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-card);
      }

      .book-title {
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1.4;
        color: var(--text-primary);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-main);
      }

      ::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #777;
      }

      .spacer {
        height: 40px;
      }
    </style>

    <script>

    <!-- Bookshelf Generator -->
    <script>
      const books = [
        { title: "帝霸", url: "diba-yanbixiaosheng/diba-yanbixiaosheng.html", cover: "帝霸封面.jpg" },
        { title: "全職法師", url: "quanzhifashi-luan/quanzhifashi-luan.html", cover: "全職法師封面.jpg" },
        { title: "凡人修仙傳", url: "fanrenxiuxianchuan-wangyu/fanrenxiuxianchuan-wangyu.html", cover: "凡人修仙傳封面.jpg" },
        { title: "凡人修仙之仙界篇", url: "fanrenxiuxianzhixianjiepian-wangyu/fanrenxiuxianzhixianjiepian-wangyu.html", cover: "凡人修仙之仙界篇封面.jpg" },
        { title: "魔天記", url: "motianji-wangyu/motianji-wangyu.html", cover: "魔天記封面.jpg" },
        { title: "玄界之門", url: "xuanjiezhimen-wangyu/xuanjiezhimen-wangyu.html", cover: "玄界之門封面.jpg" },
        { title: "仙逆", url: "xianni-ergen/xianni-ergen.html", cover: "仙逆封面.jpg" },
        { title: "求魔", url: "qiumo-ergen/qiumo-ergen.html", cover: "求魔封面.jpg" },
        { title: "我欲封天", url: "woyufengtian-ergen/woyufengtian-ergen.html", cover: "我欲封天封面.jpg" },
        { title: "一念永恆", url: "yinianyongheng-ergen/yinianyongheng-ergen.html", cover: "一念永恆封面.jpg" },
        { title: "三寸人間", url: "sancunrenjian-ergen/sancunrenjian-ergen.html", cover: "三寸人間封面.jpg" },
        { title: "吞噬星空", url: "tunshixingkong-wochixihongshi/tunshixingkong-wochixihongshi.html", cover: "吞噬星空封面.jpg" },
        { title: "飛劍問道", url: "feijianwendao-wochixihongshi/feijianwendao-wochixihongshi.html", cover: "飛劍問道封面.jpg" },
        { title: "滄元圖", url: "cangyuantu-wochixihongshi/cangyuantu-wochixihongshi.html", cover: "滄元圖封面.jpg" },
        { title: "我師兄實在太穩健了", url: "woshixiongshizaitaiwenjianle-yanguizhengzhuan/woshixiongshizaitaiwenjianle-yanguizhengzhuan.html", cover: "我師兄實在太穩健了封面.jpg" },
        { title: "修真聊天羣", url: "xiuzhenliaotianqunliaotianqunderichangshenghuo-shengqishidechuanshuo/xiuzhenliaotianqunliaotianqunderichangshenghuo-shengqishidechuanshuo.html", cover: "修真聊天羣封面.jpg" },
        { title: "大奉打更人", url: "dafengdagengren-maibaoxiaolangjun/dafengdagengren-maibaoxiaolangjun.html", cover: "大奉打更人封面.jpg" },
        { title: "大符篆師", url: "dafuzhuanshi-xiaodaofengli/dafuzhuanshi-xiaodaofengli.html", cover: "大符篆師封面.jpg" },
        { title: "牧龍師", url: "mulongshi-luan/mulongshi-luan.html", cover: "牧龍師封面.jpg" },
        { title: "百鍊成仙", url: "bailianchengxian-huanyu/bailianchengxian-huanyu.html", cover: "百鍊成仙封面.jpg" },
        { title: "星門", url: "xingmen-laoyingchixiaoji/xingmen-laoyingchixiaoji.html", cover: "星門封面.jpg" },
        { title: "不科學御獸", url: "bukexueyushou-qingquanliuxiang/bukexueyushou-qingquanliuxiang.html", cover: "不科學御獸封面.jpg" },
        { title: "我的徒弟都是大反派", url: "wodetudidoushidafanpai-moushengrenzhuanpeng/wodetudidoushidafanpai-moushengrenzhuanpeng.html", cover: "我的徒弟都是大反派封面.jpg" },
        { title: "鬥破蒼穹", url: "doupocangqiong-tiancantudou/doupocangqiong-tiancantudou.html", cover: "鬥破蒼穹封面.jpg" },
        { title: "聖墟", url: "shengxu-chendong/shengxu-chendong.html", cover: "聖墟封面.jpg" },
        { title: "一品道門", url: "yipindaomen-dijiutianming/yipindaomen-dijiutianming.html", cover: "一品道門封面.jpg" },
        { title: "擇日飛昇", url: "zerifeisheng-zhaizhu/zerifeisheng-zhaizhu.html", cover: "擇日飛昇封面.jpg" },
        { title: "誰讓他修仙的！", url: "sheirangtaxiuxiande-zuibaidewuya/sheirangtaxiuxiande-zuibaidewuya.html", cover: "誰讓他修仙的！封面.jpg" }
      ];

      const container = document.getElementById('bookshelf-container');
      const searchInput = document.getElementById('searchInput');
      const authorSelect = document.getElementById('authorSelect');

      // Extract authors from folder names
      const authors = [...new Set(books.map(b => b.url.split('/')[0].split('-')[1]).filter(Boolean))];

      // Map pinyin author names to Chinese (simplified heuristic mapping based on current list)
      const authorMap = {
        "yanbixiaosheng": "厭筆蕭生",
        "luan": "亂",
        "wangyu": "忘語",
        "ergen": "耳根",
        "wochixihongshi": "我吃西紅柿",
        "yanguizhengzhuan": "言歸正傳",
        "shengqishidechuanshuo": "聖騎士的傳說",
        "maibaoxiaolangjun": "賣報小郎君",
        "xiaodaofengli": "小刀鋒利",
        "huanyu": "幻雨",
        "laoyingchixiaoji": "老鷹吃小雞",
        "qingquanliuxiang": "輕泉流響",
        "moushengrenzhuanpeng": "謀生任轉蓬",
        "tiancantudou": "天蠶土豆",
        "chendong": "辰東",
        "dijiutianming": "第九天命",
        "zhaizhu": "宅豬",
        "zuibaidewuya": "最白的烏鴉"
      };

      const customOptionsContainer = document.getElementById('customOptions');

      const authorCounts = {};
      books.forEach(b => {
        const author = b.url.split('/')[0].split('-')[1];
        if (author) {
          authorCounts[author] = (authorCounts[author] || 0) + 1;
        }
      });
      document.getElementById('total-count').textContent = `(${books.length})`;

      authors.forEach(author => {
        const count = authorCounts[author] || 0;
        const displayName = `${authorMap[author] || author} (${count})`;

        // Populate Native Select
        const option = document.createElement('option');
        option.value = author;
        option.textContent = displayName;
        authorSelect.appendChild(option);

        // Populate Custom Select
        const span = document.createElement('span');
        span.className = 'custom-option';
        span.setAttribute('data-value', author);
        span.textContent = displayName;
        customOptionsContainer.appendChild(span);
      });

      // Custom Select Logic
      const customSelect = document.getElementById('customSelect');
      const customSelectText = document.getElementById('custom-select-text');

      customSelect.addEventListener('click', function (e) {
        customSelect.classList.toggle('open');
        e.stopPropagation();
      });

      customOptionsContainer.addEventListener('click', function (e) {
        if (e.target.classList.contains('custom-option')) {
          // Update selected style
          document.querySelectorAll('.custom-option').forEach(opt => opt.classList.remove('selected'));
          e.target.classList.add('selected');

          // Update text and hidden select value
          customSelectText.textContent = e.target.textContent;
          authorSelect.value = e.target.getAttribute('data-value');

          // Close dropdown and trigger filter
          customSelect.classList.remove('open');
          renderBooks();
        }
      });

      document.addEventListener('click', function () {
        customSelect.classList.remove('open');
      });

      function renderBooks() {
        container.innerHTML = '';
        const query = searchInput.value.toLowerCase();
        const author = authorSelect.value;

        const filtered = books.filter(b => {
          const matchTitle = b.title.toLowerCase().includes(query);
          const bAuthor = b.url.split('/')[0].split('-')[1];
          const matchAuthor = author === "" || bAuthor === author;
          return matchTitle && matchAuthor;
        });

        filtered.forEach(book => {
          const a = document.createElement('a');
          a.href = book.url;
          a.className = 'book-card';
          a.innerHTML = `
            <div class="book-cover-wrapper">
              <img src="picture/${book.cover}" class="book-cover" alt="${book.title} 封面" onerror="this.src='picture/cover.jpg'">
            </div>
            <div class="book-info">
              <div class="book-title">${book.title}</div>
            </div>
          `;
          container.appendChild(a);
        });
      }

      searchInput.addEventListener('input', renderBooks);
      authorSelect.addEventListener('change', renderBooks);
      renderBooks();
    </script>

  </body>
