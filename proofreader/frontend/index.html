<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 輔助小說校對系統</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 左側邊欄 -->
  <div id="sidebar">
    <div class="sidebar-brand">
      <h1>小說校對系統</h1>
      <div id="api-status" class="badge">連線中...</div>
    </div>
    
    <div class="sidebar-section">
      <h3>小說專案 <span id="novel-count"></span></h3>
      <div id="novel-list" class="list-container">
        <div class="loading-text">載入中...</div>
      </div>
    </div>

    <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column;">
      <h3>章節清單 <span id="chapter-count"></span></h3>
      <div id="chapter-list" class="list-container" style="flex:1;">
        <div class="empty-text">請先選擇小說</div>
      </div>
    </div>
  </div>

  <!-- 主要內容區 -->
  <div id="main">
    
    <!-- 頂部控制列 -->
    <div id="topbar">
      <h2 id="current-info">請選擇章節</h2>
      
      <div id="actions" style="display:none;">
        <label class="chk-label"><input type="checkbox" id="chk-mark" checked> 標記錯誤</label>
        <label class="chk-label"><input type="checkbox" id="chk-analyze" checked> 角色/劇情分析</label>
        <label class="chk-label"><input type="checkbox" id="chk-use-cache" checked> 使用快取</label>
        <button id="btn-analyze" class="btn primary">啟動 AI 分析</button>
        <button id="btn-edit-mode" class="btn outline">進入手動編輯</button>
        <button id="btn-apply" class="btn success">儲存至檔案</button>
        <button id="btn-export" class="btn outline" title="將角色與劇情資料傳送至閱讀助手">匯出至閱讀助手</button>
      </div>
    </div>

    <!-- 標籤頁導航 -->
    <div id="tabs" style="display:none;">
      <button class="tab-btn active" data-tab="proofread">人工校對 (Human-in-the-loop)</button>
      <button class="tab-btn" data-tab="analysis">角色與劇情分析</button>
      <button class="tab-btn" data-tab="batch">批次處理</button>
    </div>

    <!-- 工作區 -->
    <div id="workspace">
      <div id="empty-state" class="empty-state">
        <div class="home-hero">
          <div class="hero-icon">✨</div>
          <h2>歡迎使用 AI 校對助手</h2>
          <p>請從左側選擇小說與章節開始工作，或使用下方的高級功能：</p>
          
          <div class="premium-card">
            <div class="card-tag">PREMIUM</div>
            <h3>高級全庫批次處理</h3>
            <p>自動掃描系統內所有小說的未分析章節，建立完整的跨卷角色字典與劇情時間軸。</p>
            
            <div id="global-batch-ui" class="batch-status-ui" style="display:none;">
              <div class="progress-meta">
                <span id="global-batch-label">正在處理...</span>
                <span id="global-batch-eta">預計剩餘：--:--</span>
              </div>
              <div class="progress-track">
                <div id="global-batch-progress" class="progress-fill"></div>
              </div>
              <div id="global-batch-details" class="batch-details"></div>
            </div>

            <div class="batch-controls">
              <button id="btn-global-batch" class="btn primary large">啟動全庫自動掃描</button>
              <button id="btn-global-stop" class="btn outline large" style="display:none;">停止掃描</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 人工校對分頁 -->
      <div id="tab-proofread" class="tab-content">
        <div class="editor-layout">
          <!-- 文字編輯區 -->
          <div class="editor-pane">
            <div id="editor-content" class="editor-text"></div>
            <textarea id="editor-manual" class="editor-text" style="display:none; width:100%; height:100%; border:none; outline:none; resize:none; padding: 0; background: transparent;"></textarea>
          </div>
          
          <!-- 問題列表區 -->
          <div class="issue-pane">
            <div class="issue-header">
              <h3>偵測到的問題</h3>
              <button id="btn-accept-all" class="btn small outline">全部接受</button>
            </div>
            <div id="issue-warnings" class="issue-warnings"></div>
            
            <div class="filter-group">
              <button class="filter-btn active" data-filter="all">全部</button>
              <button class="filter-btn" data-filter="錯字">錯字</button>
              <button class="filter-btn" data-filter="人名">人名</button>
              <button class="filter-btn" data-filter="雜訊">雜訊</button>
            </div>

            <div id="issue-list" class="issue-list"></div>
          </div>
        </div>
      </div>
      
      <!-- 角色與劇情分析分頁 -->
      <div id="tab-analysis" class="tab-content" style="display:none;">
        <div class="analysis-layout">
          <div class="analysis-sidebar">
            <div class="analysis-section">
              <h4>故事大綱</h4>
              <div id="analysis-summary" class="summary-box">尚未進行分析</div>
            </div>
            <div class="analysis-section">
              <h4>登場角色</h4>
              <div id="analysis-characters" class="character-grid"></div>
            </div>
          </div>
          <div class="analysis-main">
            <h4>劇情時間軸</h4>
            <div id="analysis-timeline" class="timeline-container"></div>
          </div>
        </div>
      </div>
      
      <div id="tab-batch" class="tab-content" style="display:none;">
        <div class="batch-header">
          <div>
            <h3>批次分析佇列</h3>
            <p class="desc">自動掃描並標記所選小說的所有章節</p>
          </div>
          <button id="btn-batch-start" class="btn primary">開始批次掃描</button>
        </div>
        <div id="batch-list" class="batch-list"></div>
      </div>
    </div>
  </div>

  <!-- 手動修改 Modal -->
  <div id="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>手動修改</h3>
      <p class="desc">請輸入您要替換的正確文字：</p>
      <input type="text" id="modal-input" class="form-input">
      <div class="modal-footer">
        <button id="modal-cancel" class="btn">取消</button>
        <button id="modal-confirm" class="btn primary">確認修改</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
